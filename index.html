<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>どうぶつ あそび</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', system-ui, sans-serif;
  background: #FFF8E7;
  min-height: 100vh;
  overflow: hidden;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  padding: 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.screen.active {
  display: flex;
}

/* ===================== */
/* スタート画面           */
/* ===================== */
#start-screen {
  gap: 30px;
}

.game-title {
  font-size: clamp(28px, 10vw, 48px);
  font-weight: 900;
  color: #FF6B9D;
  text-shadow: 3px 3px 0 #FFB8D0;
  letter-spacing: 0.1em;
  white-space: nowrap;
}

.level-buttons {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 100%;
  max-width: 400px;
}

.level-btn {
  padding: 24px 40px;
  font-size: 28px;
  font-weight: 800;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 6px 0 rgba(0,0,0,0.15);
  letter-spacing: 0.05em;
}

.level-btn:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 rgba(0,0,0,0.15);
}

.level-btn.lv1 { background: #FFD93D; color: #8B6914; }
.level-btn.lv2 { background: #6BCB77; color: #2D6A34; }
.level-btn.lv3 { background: #4D96FF; color: #1A3A6B; }

.level-desc {
  font-size: 16px;
  font-weight: 500;
  opacity: 0.8;
  margin-top: 4px;
}

.settings-btn {
  position: fixed;
  top: 16px;
  right: 16px;
  width: 52px;
  height: 52px;
  font-size: 28px;
  background: #FFF;
  border: 3px solid #DDD;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

/* ===================== */
/* 設定画面               */
/* ===================== */
#settings-screen {
  justify-content: flex-start;
  padding-top: 30px;
  padding-bottom: 40px;
  gap: 16px;
}

.settings-title {
  font-size: 28px;
  font-weight: 800;
  color: #555;
}

.settings-actions {
  display: flex;
  gap: 12px;
}

.settings-actions button {
  padding: 10px 20px;
  font-size: 16px;
  font-weight: 700;
  border: 2px solid #CCC;
  border-radius: 12px;
  background: #FFF;
  cursor: pointer;
}

.row-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  width: 100%;
  max-width: 450px;
}

.row-checkbox {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  background: #FFF;
  border: 2px solid #E0E0E0;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  transition: background 0.15s, border-color 0.15s;
}

.row-checkbox.checked {
  background: #E8F5E9;
  border-color: #66BB6A;
}

.row-checkbox .checkmark {
  width: 28px;
  height: 28px;
  border: 3px solid #CCC;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  background: #FFF;
  flex-shrink: 0;
}

.row-checkbox.checked .checkmark {
  background: #66BB6A;
  border-color: #66BB6A;
  color: #FFF;
}

.back-btn {
  padding: 16px 48px;
  font-size: 22px;
  font-weight: 800;
  background: #FF6B9D;
  color: #FFF;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  margin-top: 10px;
  box-shadow: 0 4px 0 #D4507A;
}

.back-btn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #D4507A;
}

/* ===================== */
/* ゲーム画面             */
/* ===================== */
#game-screen {
  justify-content: space-between;
  padding: 20px 20px 30px;
  gap: 10px;
  position: relative;
  overflow: hidden;
  touch-action: none;
}

.question-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  position: relative;
  width: 100%;
  margin-top: 40px;
}

.question-text {
  font-size: 42px;
  font-weight: 900;
  color: #333;
}

.question-text .highlight {
  color: #FF6B9D;
  font-size: 52px;
}

.sound-btn {
  width: 64px;
  height: 64px;
  font-size: 36px;
  background: #FFF3CD;
  border: 3px solid #FFD93D;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sound-btn:active {
  transform: scale(0.93);
}

.hint-area {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 80px;
}

/* Level 1: 背景ヒント */
.hint-bg {
  font-size: 120px;
  color: rgba(255, 107, 157, 0.15);
  position: absolute;
  pointer-events: none;
  line-height: 1;
}

/* Level 2: ？ボタン */
.hint-btn {
  width: 56px;
  height: 56px;
  font-size: 30px;
  font-weight: 900;
  background: #E1BEE7;
  color: #7B1FA2;
  border: 3px solid #CE93D8;
  border-radius: 50%;
  cursor: pointer;
}

.hint-btn:active {
  transform: scale(0.93);
}

.hint-peek {
  font-size: 80px;
  line-height: 1;
  animation: peekIn 1.2s ease-out forwards;
}

@keyframes peekIn {
  0% { opacity: 1; transform: scale(1.2); }
  70% { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(0.8); }
}

.choices-area {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 16px;
  width: 100%;
  max-width: 560px;
}

.choice-btn {
  width: 120px;
  height: 120px;
  font-size: 72px;
  line-height: 1;
  background: #FFF;
  border: 4px solid #DDD;
  border-radius: 20px;
  cursor: pointer;
  transition: transform 0.12s, border-color 0.12s, background 0.12s;
  box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
}

.choice-btn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.1);
}

.choice-btn.correct {
  background: #C8E6C9;
  border-color: #4CAF50;
  animation: correctPop 0.4s ease-out;
}

@keyframes correctPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.choice-btn.wrong {
  animation: shake 0.4s ease-out;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.feedback-text {
  font-size: 32px;
  font-weight: 900;
  min-height: 44px;
  text-align: center;
}

.feedback-text.correct {
  color: #FF6B9D;
  animation: bounceIn 0.4s ease-out;
}

.feedback-text.wrong {
  color: #999;
  font-size: 24px;
}

@keyframes bounceIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.home-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 10px 20px;
  font-size: 18px;
  font-weight: 700;
  background: #EEE;
  color: #777;
  border: 2px solid #DDD;
  border-radius: 14px;
  cursor: pointer;
}

.home-btn:active {
  transform: translateY(2px);
}

.progress-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  position: absolute;
  top: 16px;
  left: 16px;
}

.progress-star {
  font-size: 22px;
  opacity: 0.25;
  transition: opacity 0.3s, transform 0.3s;
}

.progress-star.filled {
  opacity: 1;
  transform: scale(1.2);
}

/* ===================== */
/* マイルストーン画面     */
/* ===================== */
#milestone-screen {
  gap: 30px;
  background: linear-gradient(135deg, #FFF8E7 0%, #FFE8F0 50%, #E8F0FF 100%);
}

.milestone-title {
  font-size: 64px;
  font-weight: 900;
  color: #FF6B9D;
  text-shadow: 3px 3px 0 #FFB8D0;
  animation: milestoneBounce 0.6s ease-out;
}

@keyframes milestoneBounce {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); opacity: 1; }
}

.milestone-sub {
  font-size: 28px;
  font-weight: 700;
  color: #FF8E53;
}

.milestone-buttons {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 360px;
}

.milestone-btn {
  padding: 22px 40px;
  font-size: 26px;
  font-weight: 800;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,0.15);
}

.milestone-btn:active {
  transform: translateY(3px);
  box-shadow: 0 3px 0 rgba(0,0,0,0.15);
}

.milestone-btn.continue { background: #6BCB77; color: #FFF; }
.milestone-btn.home { background: #FFD93D; color: #8B6914; }

/* ===================== */
/* 学習記録画面           */
/* ===================== */
.history-btn {
  position: fixed;
  top: 16px;
  left: 16px;
  width: 52px;
  height: 52px;
  font-size: 28px;
  background: #FFF;
  border: 3px solid #DDD;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#history-screen {
  justify-content: flex-start;
  padding-top: 30px;
  padding-bottom: 40px;
  gap: 16px;
}

.history-title {
  font-size: 28px;
  font-weight: 800;
  color: #555;
}

.history-content {
  width: 100%;
  max-width: 500px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.history-summary {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #555;
  background: #FFF;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.history-summary .big-number {
  font-size: 36px;
  color: #FF6B9D;
  font-weight: 900;
}

.history-section-title {
  font-size: 18px;
  font-weight: 800;
  color: #888;
  text-align: center;
  margin-bottom: 4px;
}

.daily-chart {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #FFF;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.daily-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 700;
  color: #666;
}

.daily-label { width: 50px; text-align: right; flex-shrink: 0; }

.daily-bar-bg {
  flex: 1;
  height: 22px;
  background: #F0F0F0;
  border-radius: 11px;
  overflow: hidden;
}

.daily-bar {
  height: 100%;
  border-radius: 11px;
  background: #6BCB77;
  transition: width 0.4s ease;
}

.daily-pct { width: 50px; text-align: left; flex-shrink: 0; font-size: 14px; }
.daily-nodata { color: #CCC; font-size: 13px; }

.char-stats {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #FFF;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.char-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.char-row-label {
  width: 100%;
  color: #888;
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 2px;
}

.char-cell {
  display: flex;
  align-items: center;
  gap: 2px;
  font-size: 18px;
}

.char-cell .char-icon { font-size: 14px; }

.char-cell.rate-high .char-icon { color: #4CAF50; }
.char-cell.rate-mid .char-icon { color: #FF9800; }
.char-cell.rate-low .char-icon { color: #F44336; }
.char-cell.rate-none .char-icon { color: #DDD; }

.history-actions {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.history-action-btn {
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 700;
  border: 2px solid #CCC;
  border-radius: 12px;
  background: #FFF;
  cursor: pointer;
}

.history-action-btn:active { transform: translateY(2px); }
.history-action-btn.reset-btn { border-color: #FFCDD2; color: #C62828; }

/* ===================== */
/* 紙吹雪アニメーション   */
/* ===================== */
.confetti-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 100;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 12px; height: 12px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
}

@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen" class="screen active">
  <div class="game-title">🐾 どうぶつ あそび</div>
  <div class="level-buttons">
    <button class="level-btn lv1" onclick="startGame(1)">
      レベル 1
      <div class="level-desc">えが おおきく みえるよ</div>
    </button>
    <button class="level-btn lv2" onclick="startGame(2)">
      レベル 2
      <div class="level-desc">ヒントが あるよ</div>
    </button>
    <button class="level-btn lv3" onclick="startGame(3)">
      レベル 3
      <div class="level-desc">ヒントなし チャレンジ！</div>
    </button>
  </div>
  <button class="settings-btn" onclick="showScreen('settings-screen')">⚙️</button>
  <button class="history-btn" onclick="showHistoryScreen()">📊</button>
</div>

<!-- 設定画面 -->
<div id="settings-screen" class="screen">
  <div class="settings-title">どうぶつの せってい</div>
  <div class="settings-actions">
    <button onclick="toggleAll(true)">ぜんぶ えらぶ</button>
    <button onclick="toggleAll(false)">ぜんぶ はずす</button>
  </div>
  <div class="row-grid" id="row-grid"></div>
  <button class="back-btn" onclick="saveSettingsAndGoBack()">もどる</button>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" class="screen">
  <div class="progress-bar" id="progress-bar"></div>
  <div class="question-area">
    <div class="question-text">
      <span class="highlight" id="question-char"></span> はどれ？
    </div>
    <button class="sound-btn" onclick="playAnimalAudio(currentAnswer)">🔊</button>
    <div class="hint-area" id="hint-area"></div>
  </div>
  <div class="choices-area" id="choices-area"></div>
  <div class="feedback-text" id="feedback"></div>
  <button class="home-btn" onclick="goHome()">🏠 もどる</button>
</div>

<!-- 学習記録画面 -->
<div id="history-screen" class="screen">
  <div class="history-title">📊 がくしゅう きろく</div>
  <div class="history-content" id="history-content"></div>
  <div class="history-actions">
    <button class="history-action-btn export-btn" onclick="exportHistory()">📥 データを ほぞん</button>
    <button class="history-action-btn reset-btn" onclick="resetHistory()">🗑 リセット</button>
  </div>
  <button class="back-btn" onclick="goHome()">🏠 もどる</button>
</div>

<!-- マイルストーン画面 -->
<div id="milestone-screen" class="screen">
  <div class="milestone-title">やったね！</div>
  <div class="milestone-sub">5もん せいかい！</div>
  <div class="milestone-buttons">
    <button class="milestone-btn continue" onclick="continuePlaying()">つづける</button>
    <button class="milestone-btn home" onclick="goHome()">レベルを えらぶ</button>
  </div>
</div>

<!-- 紙吹雪コンテナ -->
<div class="confetti-container" id="confetti-container"></div>

<script>
// =====================
// どうぶつデータ
// =====================
const ANIMALS = {
  'いえの どうぶつ': [
    { name: 'いぬ',     emoji: '🐕', file: 'inu'      },
    { name: 'ねこ',     emoji: '🐱', file: 'neko'     },
    { name: 'うさぎ',   emoji: '🐰', file: 'usagi'    },
    { name: 'ぶた',     emoji: '🐷', file: 'buta'     },
    { name: 'うし',     emoji: '🐮', file: 'ushi'     },
    { name: 'ひつじ',   emoji: '🐑', file: 'hitsuji'  },
    { name: 'うま',     emoji: '🐴', file: 'uma'      },
    { name: 'にわとり', emoji: '🐔', file: 'niwatori' },
  ],
  'もりの どうぶつ': [
    { name: 'くま',   emoji: '🐻', file: 'kuma'   },
    { name: 'さる',   emoji: '🐵', file: 'saru'   },
    { name: 'きつね', emoji: '🦊', file: 'kitsune'},
    { name: 'ぱんだ', emoji: '🐼', file: 'panda'  },
    { name: 'こあら', emoji: '🐨', file: 'koala'  },
    { name: 'りす',   emoji: '🐿️', file: 'risu'   },
  ],
  'サバンナの どうぶつ': [
    { name: 'ぞう',     emoji: '🐘', file: 'zou'      },
    { name: 'きりん',   emoji: '🦒', file: 'kirin'    },
    { name: 'らいおん', emoji: '🦁', file: 'raion'    },
    { name: 'しまうま', emoji: '🦓', file: 'shimauma' },
    { name: 'かば',     emoji: '🦛', file: 'kaba'     },
  ],
  'うみの いきもの': [
    { name: 'さかな', emoji: '🐟', file: 'sakana' },
    { name: 'くじら', emoji: '🐳', file: 'kujira' },
    { name: 'いるか', emoji: '🐬', file: 'iruka'  },
    { name: 'たこ',   emoji: '🐙', file: 'tako'   },
    { name: 'かに',   emoji: '🦀', file: 'kani'   },
  ],
  'むし・は虫類': [
    { name: 'ちょうちょ', emoji: '🦋', file: 'choucho' },
    { name: 'かえる',     emoji: '🐸', file: 'kaeru'   },
    { name: 'かめ',       emoji: '🐢', file: 'kame'    },
    { name: 'へび',       emoji: '🐍', file: 'hebi'    },
    { name: 'あひる',     emoji: '🦆', file: 'ahiru'   },
  ],
};

const GROUP_NAMES = Object.keys(ANIMALS);

const PRAISE_WORDS = ['すごい！', 'やったね！', 'てんさい！', 'かっこいい！', 'すばらしい！'];

const PRAISE_AUDIO_MAP = {
  'すごい！':     'sugoi',
  'やったね！':   'yattane',
  'てんさい！':   'tensai',
  'かっこいい！': 'kakkoii',
  'すばらしい！': 'subarashii',
};

const MILESTONE_COUNT = 5;

// =====================
// 状態管理
// =====================
let currentLevel = 1;
let currentAnswer = null; // { name, emoji, file }
let isAnswered = false;
let selectedGroups = [...GROUP_NAMES];
let correctCount = 0;
let questionRecorded = false;

const audioAvailableCache = {};

// =====================
// 学習記録
// =====================
function loadHistory() {
  try {
    const raw = localStorage.getItem('animal-history');
    if (!raw) return [];
    const data = JSON.parse(raw);
    if (!Array.isArray(data)) return [];
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 90);
    const cutoffStr = cutoff.toISOString().slice(0, 10);
    const filtered = data.filter(function(r) { return r.date >= cutoffStr; });
    if (filtered.length !== data.length) {
      localStorage.setItem('animal-history', JSON.stringify(filtered));
    }
    return filtered;
  } catch (e) {
    return [];
  }
}

function recordAnswer(name, level, correct) {
  try {
    const history = loadHistory();
    history.push({
      date: new Date().toISOString().slice(0, 10),
      char: name,
      level: level,
      correct: correct,
    });
    localStorage.setItem('animal-history', JSON.stringify(history));
  } catch (e) {}
}

function getStats() {
  const history = loadHistory();
  const total = history.length;
  const totalCorrect = history.filter(function(r) { return r.correct; }).length;

  const dailyMap = {};
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    dailyMap[key] = { total: 0, correct: 0 };
  }
  history.forEach(function(r) {
    if (dailyMap[r.date]) {
      dailyMap[r.date].total++;
      if (r.correct) dailyMap[r.date].correct++;
    }
  });

  const charMap = {};
  history.forEach(function(r) {
    if (!charMap[r.char]) charMap[r.char] = { total: 0, correct: 0 };
    charMap[r.char].total++;
    if (r.correct) charMap[r.char].correct++;
  });

  return {
    total: total,
    totalCorrect: totalCorrect,
    totalRate: total > 0 ? Math.round(totalCorrect / total * 100) : 0,
    daily: dailyMap,
    charStats: charMap,
  };
}

// =====================
// Thompson Sampling
// =====================
function sampleBeta(alpha, beta) {
  function sampleGamma(shape) {
    if (shape < 1) return sampleGamma(shape + 1) * Math.pow(Math.random(), 1 / shape);
    const d = shape - 1 / 3;
    const c = 1 / Math.sqrt(9 * d);
    while (true) {
      let x, v;
      do { x = normalRandom(); v = 1 + c * x; } while (v <= 0);
      v = v * v * v;
      const u = Math.random();
      if (u < 1 - 0.0331 * (x * x) * (x * x)) return d * v;
      if (Math.log(u) < 0.5 * x * x + d * (1 - v + Math.log(v))) return d * v;
    }
  }
  function normalRandom() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  const ga = sampleGamma(alpha);
  const gb = sampleGamma(beta);
  return ga / (ga + gb);
}

function selectByThompson(animals) {
  const stats = getStats().charStats;
  let best = null, bestScore = -1;
  animals.forEach(function(animal) {
    const s = stats[animal.name] || { total: 0, correct: 0 };
    const alpha = (s.total - s.correct) + 1;
    const beta  = s.correct + 1;
    const score = sampleBeta(alpha, beta);
    if (score > bestScore) { bestScore = score; best = animal; }
  });
  return best;
}

// =====================
// 画面切り替え
// =====================
function preventScroll(e) { e.preventDefault(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if (id === 'game-screen') {
    document.addEventListener('touchmove', preventScroll, { passive: false });
  } else {
    document.removeEventListener('touchmove', preventScroll);
  }

  if (id === 'settings-screen') renderSettings();
}

function goHome() {
  showScreen('start-screen');
}

// =====================
// 設定画面
// =====================
function renderSettings() {
  const grid = document.getElementById('row-grid');
  grid.innerHTML = '';
  GROUP_NAMES.forEach(group => {
    const isChecked = selectedGroups.includes(group);
    const div = document.createElement('div');
    div.className = 'row-checkbox' + (isChecked ? ' checked' : '');
    div.innerHTML = '<span class="checkmark">' + (isChecked ? '✓' : '') + '</span>' + group;
    div.onclick = function() {
      const idx = selectedGroups.indexOf(group);
      if (idx >= 0) selectedGroups.splice(idx, 1);
      else selectedGroups.push(group);
      renderSettings();
    };
    grid.appendChild(div);
  });
}

function toggleAll(on) {
  selectedGroups = on ? [...GROUP_NAMES] : [];
  renderSettings();
}

function saveSettingsAndGoBack() {
  if (selectedGroups.length === 0) selectedGroups = [...GROUP_NAMES];
  try {
    localStorage.setItem('animal-groups', JSON.stringify(selectedGroups));
  } catch (e) {}
  showScreen('start-screen');
}

function loadSettings() {
  try {
    const saved = localStorage.getItem('animal-groups');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) {
        selectedGroups = parsed.filter(g => GROUP_NAMES.includes(g));
        if (selectedGroups.length === 0) selectedGroups = [...GROUP_NAMES];
      }
    }
  } catch (e) {}
}

// =====================
// ゲームロジック
// =====================
function getAvailableAnimals() {
  const animals = [];
  selectedGroups.forEach(group => {
    if (ANIMALS[group]) animals.push(...ANIMALS[group]);
  });
  return animals.length > 0 ? animals : Object.values(ANIMALS).flat();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function startGame(level) {
  currentLevel = level;
  correctCount = 0;
  showScreen('game-screen');
  nextQuestion();
}

function continuePlaying() {
  correctCount = 0;
  showScreen('game-screen');
  nextQuestion();
}

function renderProgress() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  for (let i = 0; i < MILESTONE_COUNT; i++) {
    const star = document.createElement('span');
    star.className = 'progress-star' + (i < correctCount ? ' filled' : '');
    star.textContent = '⭐';
    bar.appendChild(star);
  }
}

function nextQuestion() {
  isAnswered = false;
  questionRecorded = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback-text';

  renderProgress();

  const animals = getAvailableAnimals();
  const numChoices = currentLevel === 1 ? 2 : currentLevel === 2 ? 3 : 5;

  currentAnswer = selectByThompson(animals);

  const others = shuffle(animals.filter(a => a.name !== currentAnswer.name));
  const choices = shuffle([currentAnswer, ...others.slice(0, numChoices - 1)]);

  document.getElementById('question-char').textContent = currentAnswer.name;

  // ヒントエリア
  const hintArea = document.getElementById('hint-area');
  hintArea.innerHTML = '';

  if (currentLevel === 1) {
    const hintBg = document.createElement('div');
    hintBg.className = 'hint-bg';
    hintBg.textContent = currentAnswer.emoji;
    hintArea.appendChild(hintBg);
  } else if (currentLevel === 2) {
    const hintBtn = document.createElement('button');
    hintBtn.className = 'hint-btn';
    hintBtn.textContent = '？';
    hintBtn.onclick = function() {
      hintArea.innerHTML = '';
      const peek = document.createElement('div');
      peek.className = 'hint-peek';
      peek.textContent = currentAnswer.emoji;
      hintArea.appendChild(peek);
      setTimeout(function() {
        hintArea.innerHTML = '';
        hintArea.appendChild(hintBtn);
      }, 1200);
    };
    hintArea.appendChild(hintBtn);
  }

  // 選択肢ボタン（絵文字）
  const choicesArea = document.getElementById('choices-area');
  choicesArea.innerHTML = '';
  choices.forEach(animal => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = animal.emoji;
    btn.onclick = function() { handleChoice(btn, animal); };
    choicesArea.appendChild(btn);
  });

  playAnimalAudio(currentAnswer);
}

function handleChoice(btn, chosen) {
  if (isAnswered) return;

  if (chosen.name === currentAnswer.name) {
    isAnswered = true;
    btn.classList.add('correct');
    correctCount++;
    recordAnswer(currentAnswer.name, currentLevel, true);

    if (navigator.vibrate) navigator.vibrate(100);

    playAudio('./audio/correct' + (Math.floor(Math.random() * 5) + 1) + '.mp3', 0.3);

    const praise = pickRandom(PRAISE_WORDS);
    const feedback = document.getElementById('feedback');
    feedback.textContent = praise;
    feedback.className = 'feedback-text correct';

    showConfetti();
    renderProgress();

    const praiseKey = PRAISE_AUDIO_MAP[praise];
    playAudio('./audio/' + currentAnswer.file + '.wav').then(function() {
      setTimeout(function() {
        playAudio('./audio/' + praiseKey + '.wav');
      }, 600);
    });

    if (correctCount >= MILESTONE_COUNT) {
      setTimeout(showMilestone, 1800);
    } else {
      setTimeout(nextQuestion, 1800);
    }
  } else {
    if (!questionRecorded) {
      questionRecorded = true;
      recordAnswer(currentAnswer.name, currentLevel, false);
    }
    btn.classList.add('wrong');
    const feedback = document.getElementById('feedback');
    feedback.textContent = 'もういちど やってみよう！';
    feedback.className = 'feedback-text wrong';
    setTimeout(function() { btn.classList.remove('wrong'); }, 400);
  }
}

function showMilestone() {
  showScreen('milestone-screen');
  showConfetti();
  playAudio('./audio/yattane_big.wav');
}

// =====================
// 音声再生
// =====================
function playAudio(path, volume) {
  return new Promise(function(resolve) {
    if (audioAvailableCache[path] === false) { resolve(false); return; }
    const audio = new Audio(path);
    if (volume !== undefined) audio.volume = volume;
    audio.addEventListener('canplaythrough', function() {
      audioAvailableCache[path] = true;
      audio.play().then(function() { resolve(true); }).catch(function() { resolve(false); });
    }, { once: true });
    audio.addEventListener('error', function() {
      audioAvailableCache[path] = false;
      resolve(false);
    }, { once: true });
    setTimeout(function() {
      if (audioAvailableCache[path] === undefined) {
        audioAvailableCache[path] = false;
        resolve(false);
      }
    }, 2000);
  });
}

function playAnimalAudio(animal) {
  playAudio('./audio/' + animal.file + '.wav').then(function(played) {
    if (!played) speakText(animal.name);
  });
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.85;
  utter.pitch = 1.2;
  window.speechSynthesis.speak(utter);
}

// =====================
// 紙吹雪
// =====================
function showConfetti() {
  const container = document.getElementById('confetti-container');
  const colors = ['#FF6B9D','#FFD93D','#6BCB77','#4D96FF','#FF8E53','#CE93D8'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    c.style.animationDelay = (Math.random() * 0.5) + 's';
    c.style.width = (8 + Math.random() * 8) + 'px';
    c.style.height = (8 + Math.random() * 8) + 'px';
    container.appendChild(c);
  }
  setTimeout(function() { container.innerHTML = ''; }, 3500);
}

// =====================
// 学習記録画面
// =====================
function showHistoryScreen() {
  showScreen('history-screen');
  renderHistory();
}

function renderHistory() {
  const content = document.getElementById('history-content');
  const stats = getStats();
  let html = '';

  html += '<div class="history-summary">';
  if (stats.total === 0) {
    html += 'まだ きろくが ないよ<br>あそんで みよう！';
  } else {
    html += 'ぜんぶ: <span class="big-number">' + stats.total + '</span>もん　';
    html += 'せいかいりつ: <span class="big-number">' + stats.totalRate + '%</span>';
  }
  html += '</div>';

  if (stats.total > 0) {
    html += '<div class="history-section-title">── さいきん 7にち ──</div>';
    html += '<div class="daily-chart">';
    Object.keys(stats.daily).forEach(function(dateKey) {
      const d = stats.daily[dateKey];
      const label = dateKey.slice(5).replace('-', '/');
      const pct = d.total > 0 ? Math.round(d.correct / d.total * 100) : 0;
      html += '<div class="daily-row">';
      html += '<span class="daily-label">' + label + '</span>';
      if (d.total > 0) {
        html += '<div class="daily-bar-bg"><div class="daily-bar" style="width:' + pct + '%"></div></div>';
        html += '<span class="daily-pct">' + pct + '%</span>';
      } else {
        html += '<div class="daily-bar-bg"></div><span class="daily-pct daily-nodata">—</span>';
      }
      html += '</div>';
    });
    html += '</div>';

    html += '<div class="history-section-title">── どうぶつべつ ──</div>';
    html += '<div class="char-stats">';
    GROUP_NAMES.forEach(function(group) {
      html += '<div class="char-row">';
      html += '<span class="char-row-label">' + group + '</span>';
      ANIMALS[group].forEach(function(animal) {
        const cs = stats.charStats[animal.name];
        let rateClass = 'rate-none', icon = '·';
        if (cs && cs.total > 0) {
          const r = Math.round(cs.correct / cs.total * 100);
          if (r >= 80) { rateClass = 'rate-high'; icon = '◎'; }
          else if (r >= 60) { rateClass = 'rate-mid'; icon = '○'; }
          else { rateClass = 'rate-low'; icon = '△'; }
        }
        html += '<span class="char-cell ' + rateClass + '">';
        html += animal.emoji;
        html += '<span class="char-icon">' + icon + '</span>';
        html += '</span>';
      });
      html += '</div>';
    });
    html += '</div>';
  }

  content.innerHTML = html;
}

function exportHistory() {
  const history = loadHistory();
  const blob = new Blob([JSON.stringify(history, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'animal-history-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function resetHistory() {
  if (confirm('きろくを ぜんぶ けしますか？')) {
    try { localStorage.removeItem('animal-history'); } catch (e) {}
    renderHistory();
  }
}

// =====================
// 初期化
// =====================
loadSettings();
